name: daily

# 7am PT = 14:00 UTC (PST) / 15:00 UTC (PDT). GitHub fires cron on UTC and
# doesn't follow DST — accepted: digest arrives at 6am or 7am PT depending
# on time of year (SPEC §5.5).
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  scrape-and-digest:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
      EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EVWATCH_DIGEST_FROM: ${{ vars.EVWATCH_DIGEST_FROM || 'noreply@veproductions.net' }}
      EVWATCH_DIGEST_TO: ${{ vars.EVWATCH_DIGEST_TO || 'dave@veproductions.net' }}
      EVWATCH_DASHBOARD_URL: ${{ vars.EVWATCH_DASHBOARD_URL || 'https://evwatch.veproductions.net' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install evwatch
        run: pip install -e .

      # Playwright browsers ~150MB. Cache to skip the download on every
      # run. Cache key bumps automatically when the playwright version in
      # pyproject changes (pip-cache step picks up the new requirements).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright system deps (on cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      # Each scraper is continue-on-error: a flaky source shouldn't kill
      # the whole pipeline. Failures land in evwatch.source_runs with the
      # error message and get surfaced by record_run at the end.
      - name: Scrape eBay
        run: python -m scrapers.ebay
        continue-on-error: true

      - name: Scrape CarMax
        run: python -m scrapers.carmax
        continue-on-error: true

      - name: Scrape Carvana
        run: python -m scrapers.carvana
        continue-on-error: true

      - name: Scrape Craigslist
        run: python -m scrapers.craigslist
        continue-on-error: true

      - name: Scrape AutoTempest
        run: python -m scrapers.autotempest
        continue-on-error: true

      - name: Update baselines
        # Recomputes evwatch.baselines from the last 60d of price_history.
        # Must run BEFORE detect_deals so BELOW_MARKET sees today's numbers.
        # continue-on-error: false — a stale baseline silently corrupts
        # downstream deal detection, better to halt loudly.
        run: python -m pipeline.update_baselines
        continue-on-error: false

      - name: Detect deals
        run: python -m pipeline.detect_deals
        continue-on-error: false

      - name: Send digest
        # If there's nothing to report, send_digest exits 0 and writes no
        # handoff file. If Resend itself fails, exit 1 — but we still want
        # record_run to fire so source_runs gets logged.
        run: python -m pipeline.send_digest
        continue-on-error: true

      - name: Record run
        if: always()
        run: python -m pipeline.record_run
