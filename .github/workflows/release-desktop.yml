name: release-desktop

# Trigger on annotated or lightweight tags matching v*. The desktop app's
# version in apps/desktop/package.json should match the tag name.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-14  # arm64 runner so we cross-build nothing
    timeout-minutes: 30
    env:
      # Anon key + URL baked into the renderer bundle. See SPEC §7 pt 11
      # and apps/desktop/.env.example. These are repo-level secrets.
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # Single electron-builder invocation handles sign + notarize +
      # publish. Per global CLAUDE.md VEP-wide pattern — don't split into
      # --dir / --prepackaged steps.
      - name: Build, sign, notarize, publish
        working-directory: apps/desktop
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK:                    ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD:            ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          # Renderer bundle env (Vite reads these at build time).
          VITE_SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:      ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Fail-fast if any Apple secret is missing — easier to diagnose
          # than electron-builder's silent path-not-found mode.
          : "${CSC_LINK:?CSC_LINK secret not set — copy from SlideFluid}"
          : "${CSC_KEY_PASSWORD:?CSC_KEY_PASSWORD secret not set}"
          : "${APPLE_ID:?APPLE_ID secret not set}"
          : "${APPLE_APP_SPECIFIC_PASSWORD:?APPLE_APP_SPECIFIC_PASSWORD secret not set}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID secret not set}"
          pnpm exec electron-builder --mac --publish always
