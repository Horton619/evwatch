appId: net.veproductions.evwatch
productName: evwatch
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.utilities
  # Both DMG (fresh installs) AND ZIP (electron-updater in-place swaps)
  # are required — see "Auto-update" section of ~/.claude/CLAUDE.md.
  # Missing the zip target means update downloads fail with
  # "ZIP file not provided".
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements:        build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # electron-builder v26 dropped the object form ({teamId: ...}) and made
  # mac.notarize a plain boolean — `true` enables notarization, `false`
  # disables it. The teamId comes from APPLE_TEAM_ID env var, which the
  # release workflow sets from the GHA secret. (The object form from
  # ~/.claude/CLAUDE.md was correct for v24 but is now a validation
  # error.)
  notarize: true
dmg:
  # Use productName, NOT ${name} — package.json's name is the scoped
  # workspace identifier @evwatch/desktop, and the / would land mid-path
  # ("dist/@evwatch/desktop-...dmg") which dmgbuild then can't create.
  artifactName: ${productName}-${version}-arm64.${ext}
# Skipping Windows + Linux targets — evwatch is Mac-only (SPEC §5.7).
npmRebuild: false
publish:
  provider: github
  owner: Horton619
  repo: evwatch
