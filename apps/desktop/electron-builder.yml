appId: net.veproductions.evwatch
productName: evwatch
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.utilities
  # Both DMG (fresh installs) AND ZIP (electron-updater in-place swaps)
  # are required — see "Auto-update" section of ~/.claude/CLAUDE.md.
  # Missing the zip target means update downloads fail with
  # "ZIP file not provided".
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements:        build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # electron-builder v24+ requires this explicitly; absent → notarize
  # rejects with "teamId property is required". VEP-wide Team ID per
  # global CLAUDE.md, hardcoded so a missing env var doesn't silently
  # turn into an undefined teamId.
  notarize:
    teamId: L5KZ5KGKXC
dmg:
  artifactName: ${name}-${version}-arm64.${ext}
# Skipping Windows + Linux targets — evwatch is Mac-only (SPEC §5.7).
npmRebuild: false
publish:
  provider: github
  owner: visualentropy
  repo: evwatch
